<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TM Alert — Emergency Notification System</title>
    
    <!-- 2026 STANDARD: Security meta tags -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- CSP is delivered via response headers per environment: Vite in dev
         (vite.config.ts), Vercel in prod (vercel.json). A meta CSP here
         created drift between dev/prod policies and shipped permissive
         directives (https: img wildcard, localhost connect-src) into prod
         HTML — security review F-H4. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    
    <!-- Prevent caching of sensitive pages -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Google Fonts removed: external CDN links trigger SRI-missing ZAP alert
         and cannot be SRI-hashed (content is dynamic/browser-specific).
         Fonts fall back to system equivalents via the CSS font-family stack. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>" />
    <!-- Leaflet CSS is bundled via npm import in main.jsx (no external CDN dependency) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
